# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# Tutorial: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# ══════════════════════════════════════════════════════════════════════════════

hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # IDENTITY
  # Site-level branding. For people/profiles, use the author system in
  # content/authors/ if you decide to use author profile blocks later.
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    # Site name - shown in navbar, footer, copyright, and browser title by default
    name: "Hadeel Saad"

    # Legal entity for copyright notices. Leave blank if same as name.
    organization: ""

    # Schema.org type for structured data
    type: person # person | organization | local_business

    # Short tagline displayed on your site
    tagline: ""

    # Site meta description for search engines and social sharing
    description: "Academic website for Hadeel Saad, Ph.D. candidate in paleontology at the University of Michigan."

    # Social accounts used for meta tags like Twitter Cards
    social:
      twitter: "GoOwnable" # Twitter/X handle without @

  # ────────────────────────────────────────────────────────────────────────────
  # THEME
  # Color and visual design system
  #
  # mode:
  #   system = follows visitor's computer setting, but still allows moon/sun toggle
  #   light  = starts in light mode
  #   dark   = starts in dark mode
  #
  # primary and secondary control major accent colors.
  # For exact true black/white backgrounds, use assets/scss/custom.scss.
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    mode: system
    colors:
      primary: "#DA77AC"
      secondary: "#F9B665"

  # ────────────────────────────────────────────────────────────────────────────
  # TYPOGRAPHY
  # Font and text sizing
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    # Theme pack: name from data/fonts/
    pack: "academic"

  # ────────────────────────────────────────────────────────────────────────────
  # LAYOUT
  # Spacing and shape tokens
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    # Border radius: none, sm, md, lg, or full
    radius: "md"

    # Spacing density: compact, comfortable, or spacious
    spacing: "spacious"

    # Avatar shape in author profiles
    avatar_shape: square # circle | square | rounded

  # ────────────────────────────────────────────────────────────────────────────
  # HEADER
  # Site header and navigation bar
  #
  # theme_toggle: true keeps the moon/sun button
  # theme_picker: false removes the theme style picker/dropdown
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true

    # Header style variant
    style: navbar # navbar | navbar-simple | minimal

    # Stick to top on scroll
    sticky: true

    # Menu alignment
    align: center # left | center | right

    # Feature toggles
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: true

    # Call-to-action button
    cta:
      enable: false
      text: ""
      url: ""

  # ────────────────────────────────────────────────────────────────────────────
  # FOOTER
  # Site footer
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    # Footer style variant
    style: minimal # minimal | columns | centered

    language_switcher: true

    # Custom footer text. HTML supported.
    text: ""

  # ────────────────────────────────────────────────────────────────────────────
  # COPYRIGHT
  # Legal notices and licensing
  # ────────────────────────────────────────────────────────────────────────────
  copyright:
    # Copyright notice - supports {year}, {name}, {license} placeholders
    notice: "© {year} {name}. This work is licensed under {license}"

    license:
      type: cc # cc | custom
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  # ────────────────────────────────────────────────────────────────────────────
  # SEO
  # Search engine optimization - overrides and technical settings
  # ────────────────────────────────────────────────────────────────────────────
  seo:
    # Browser tab title override. Leave blank to use identity.name.
    title: ""

    # For local_business identity type only
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""

    # AI/LLM crawler guidance
    ai:
      allow:
        - /
      disallow: []
      note: "Guidance for AI crawlers - customize to match your public content."
      contact: ""

  # ────────────────────────────────────────────────────────────────────────────
  # CONTENT
  # Content rendering and behavior
  # ────────────────────────────────────────────────────────────────────────────
  content:
    # Math rendering
    math:
      enable: false

    # Table of contents
    toc:
      enable: true

    # Reading time estimates
    reading_time:
      enable: true

    # Academic citations
    citations:
      style: apa # apa | mla | chicago | ieee

  # ────────────────────────────────────────────────────────────────────────────
  # SEARCH
  # Site search
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: true

    # Trending/suggested search terms
    suggestions: []

    # Quick action shortcuts in search modal
    quick_actions: []

  # ────────────────────────────────────────────────────────────────────────────
  # COMMENTS
  # User comments system
  # ────────────────────────────────────────────────────────────────────────────
  comments:
    enable: false
    provider: "" # giscus | disqus

    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""

    disqus:
      shortname: ""

  # ────────────────────────────────────────────────────────────────────────────
  # ANALYTICS
  # Traffic and behavior analytics
  # ────────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: "" # Google Analytics 4: G-XXXXXXXXXX

    google_tag_manager:
      container_id: "" # GTM-XXXXXXX

    plausible:
      domain: ""

    fathom:
      site_id: ""

    pirsch:
      site_id: ""

    clarity:
      project_id: ""

    baidu:
      site_id: ""

  # ────────────────────────────────────────────────────────────────────────────
  # VERIFICATION
  # Search engine site verification codes
  # ────────────────────────────────────────────────────────────────────────────
  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  # ────────────────────────────────────────────────────────────────────────────
  # REPOSITORY
  # Source code repository for "Edit this page" links
  # ────────────────────────────────────────────────────────────────────────────
  repository:
    enable: false
    url: "" # e.g., https://github.com/username/repo
    branch: main
    content_dir: content

  # ────────────────────────────────────────────────────────────────────────────
  # LOCALE
  # Regional formatting preferences
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    # Go time format
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  # ────────────────────────────────────────────────────────────────────────────
  # SECURITY
  # Security headers and policies
  #
  # frame_options: allow is useful because you are embedding interactive HTML
  # files in iframes on your Research page.
  # ────────────────────────────────────────────────────────────────────────────
  security:
    csp:
      policy: ""
      report_only: false

    frame_options: allow # deny | sameorigin | allow

    permissions_policy: ""

  # ────────────────────────────────────────────────────────────────────────────
  # PRIVACY
  # Privacy and compliance features
  # ────────────────────────────────────────────────────────────────────────────
  privacy:
    enable: false
    anonymize_analytics: true

  # ────────────────────────────────────────────────────────────────────────────
  # DEBUG
  # Development and debugging. Keep false for the public site.
  # ────────────────────────────────────────────────────────────────────────────
  debug:
    enable: false

    hud:
      position: bottom-left # top-left | top-right | bottom-left | bottom-right
      opacity: 1.0

    export_logs: true

  # ────────────────────────────────────────────────────────────────────────────
  # PREMIUM
  # Premium features and creator program
  # ────────────────────────────────────────────────────────────────────────────
  pro:
    # Hide "Powered by HugoBlox" attribution.
    # Requires HugoBlox Premium if you want to support HugoBlox another way.
    hide_attribution: false

    # Affiliate referral code for rewards program
    affiliate_code: ""
