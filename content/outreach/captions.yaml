outreach-1.jpg: "From 2017–2019, I served as an Evolutionary Ambassador at the National Museum of Natural History, using insects to introduce visitors to evolution. This was my first museum experience."

outreach-2.jpg: "In 2022, I appeared in a University of Michigan Museum of Natural History video explaining how research collections support education and scientific discovery."

teaching-mentoring-students.jpg: "Mentoring students as they develop confidence with paleontology, museum collections, and scientific research."

fieldwork-pittsburgh-2026.jpg: "Collecting Carboniferous fish material near Pittsburgh as part of ongoing work on early vertebrate diversity."

fieldwork-carboniferous-fishes.jpg: "Fieldwork focused on documenting and collecting fossil fishes from Paleozoic deposits."

fieldwork-lansing-mine.jpg: "Collecting fossil material from Carboniferous deposits in Michigan."

teaching-1.jpg: "Guest lecturing for Analytical Paleontology in 2023, presenting approaches to quantifying biodiversity alongside my favorite student, Mousse, who offered expert supervision from the podium."

teaching-2.jpg: "In 2025, I taught Earth Camp, a weeklong high school course exploring Michigan geology across the state and Upper Peninsula, including Pictured Rocks (pictured here)"

teaching-3.jpg: "At UROP 2025, my student Raven Killebrew and I presented our reidentification of a Miocene fossil fish from Indonesia during Michigan’s annual undergraduate research symposium."
