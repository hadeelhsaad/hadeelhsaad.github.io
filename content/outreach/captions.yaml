outreach-1.webp: "From 2017–2019, I served as an Evolutionary Ambassador at the National Museum of Natural History, using insects to introduce visitors to evolution. This was my first museum experience."

exhibits-1.webp: "In 2022, I appeared in a University of Michigan Museum of Natural History video explaining how research collections support education and scientific discovery."

outreach-3.webp: "I created a linocut matching activity of fossil and living fishes. Visitors discuss morphological similarities and differences between the pairs."

outreach-4.webp: "At a 2025 Women in STEM event, I brought fossils to undergraduate juniors and seniors and discussed my research and journey to graduate school."

outreach-5.webp: "At ID Day 2024, I created numerous continent puzzles representing different geological periods to discuss how plate tectonics shapes the distribution of animals through time."

exhibits-2.webp: "In 2023, I created a game showing how multiple lines of evidence together reveal how past environments shaped present biodiversity, beside an exhibit I helped create about fossil fishes."

teaching-1.webp: "Guest lecturing for Analytical Paleontology in 2023, presenting approaches to quantifying biodiversity alongside my favorite student, Mousse, who offered expert supervision from the podium."

field-2.webp: "In 2025, I taught Earth Camp, a weeklong high school course exploring Michigan geology across the state and Upper Peninsula, including Pictured Rocks."

mentoring-1.webp: "At UROP 2025, my student Raven Killebrew and I presented our reidentification of a Miocene fossil fish from Indonesia during Michigan’s annual undergraduate research symposium."
